
title: Clutchplay
email: your-email@example.com
description: >
  Clutchplay is your ultimate destination for sports and gaming enthusiasts. Dive into in-depth tactical breakdowns and expert insights on football, cricket, chess, and tennis and other sports plus fresh coverage of new game releases and the latest in esports. Passionate analysis, winning strategies, and bold opinions—all in one clutch play.
baseurl: "" # leave this empty unless the site is in a subfolder
url: "https://clutchplay.online" # your domain
author: Narendra

# Social sharing image (change path if needed)
logo: /assets/img/logo.png
image: /assets/img/social-preview.jpg

# Navbar links (Blog removed)
navbar-links:
  Home: ""
  Sports:
    Football: "football"
    Cricket: "cricket"
    Tennis: "tennis"
    Chess: "chess"
  Gaming:
    Esports: "esports"
    New Releases: "gaming"
  About: "about"

# Open Graph / Twitter Cards
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Theme
remote_theme: daattali/beautiful-jekyll

# Build settings
markdown: kramdown
highlighter: rouge

# SEO meta
twitter_username: your_twitter
github_username: RollingThunder

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
