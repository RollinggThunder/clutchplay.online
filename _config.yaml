
title: Clutchplay
email: your-email@example.com
description: >
  In-depth tactics, sharp insights, and bold takes on football, cricket, tennis, chess, esports, and the latest in gaming.
baseurl: "" # leave this empty unless the site is in a subfolder
url: "https://clutchplay.online" # your domain
author: Narendra

# Social sharing image (change path if needed)
logo: /assets/img/logo.png
image: /assets/img/social-preview.jpg

# Navbar links (Blog removed)
navbar-links:
  Home: ""
  Sports:
    Football: "football"
    Cricket: "cricket"
    Tennis: "tennis"
    Chess: "chess"
  Gaming:
    Esports: "esports"
    New Releases: "gaming"
  About: "about"

# Open Graph / Twitter Cards
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Theme
remote_theme: daattali/beautiful-jekyll

# Build settings
markdown: kramdown
highlighter: rouge

# SEO meta
twitter_username: your_twitter
github_username: RollingThunder

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
